services:
  mvbackend:
    image: felpsdevilla/mvbackend:latest
    restart: always
    ports:
      - "8001:443"
    environment:
      - NODE_ENV = prod
      - DB_USER_PASS= MySecretPassword
      - JWT_SECRET= MySuperSecret
      - JWT_SECRET_REFRESH= MySuperSecretRefresh
    volumes:
      - hostSSLPath:/etc/ssl/mvdb:ro
      - mvBackend_data:/app/public 
    depends_on:
      mvdb:
        condition: service_healthy
  mvdb:
    image: postgres:latest
    restart: always
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_PASSWORD= MySecretPassword
    volumes:
    - mvdb_data:/var/lib/postgresql/data
    - ./init.sql/Sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready"]
      interval: 1s
      timeout: 5s
      retries: 10
volumes:
  mvBackend_data:
  mvdb_data: